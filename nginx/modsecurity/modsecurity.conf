# =============================================================
# Anima 灵枢 · ModSecurity 引擎主配置
# 适用于 Nginx + libmodsecurity (ModSecurity v3)
#
# 部署路径：/opt/nginx/src/ModSecurity/modsecurity.conf
# 由 main.conf 引入，勿直接作为 modsecurity_rules_file 入口
#
# 合规对标：
#   · CIS Controls v8 — 控制项 13 (网络监控与防御)
#   · PCI-DSS v4.0    — 6.4.1 (WAF 保护公共 Web 应用)
#                     — 6.4.2 (WAF 检测/阻止常见攻击)
#                     — 10.2  (安全事件审计日志)
#
# 性能优化：
#   · SecRequestBodyLimit 适配 AI 聊天场景（最大 13 MB）
#   · SecResponseBodyAccess 关闭（避免检查 AI 生成的长文本）
#   · SecPcreMatchLimit 限制正则回溯防止 ReDoS
#
# 适配安装脚本：
#   https://raw.githubusercontent.com/mzwrt/system_script/refs/heads/main/nginx/nginx-install.sh
# =============================================================

# ─── 引擎开关 ─────────────────────────────────────────────────
# DetectionOnly = 仅日志不拦截（调试用）
# On            = 生产拦截模式（CIS/PCI-DSS 要求）
SecRuleEngine On

# ─── 请求体处理 ───────────────────────────────────────────────
# 启用请求体检查（必须开启才能检测 POST/PUT 中的注入）
SecRequestBodyAccess On

# 请求体大小限制（13 MB — 针对 JSON API 请求及文件上传；
# 文件上传走独立路径且在 CRS 前置排除规则中已跳过 WAF 检查）
SecRequestBodyLimit 13107200
# 超限时拒绝（而非截断，防止绕过）
SecRequestBodyLimitAction Reject
# 无文件时的内存缓冲（128 KB — 纯 JSON API 请求足够）
SecRequestBodyNoFilesLimit 131072

# JSON 解析深度限制（防止深度嵌套的 JSON 攻击）
SecRequestBodyJsonDepthLimit 512

# 请求参数数量限制（防止参数污染攻击）
SecArgumentsLimit 1000

# 参数数量超限时拒绝请求
SecRule &ARGS "@ge 1000" \
    "id:200007,phase:2,t:none,log,deny,status:400,\
    msg:'Failed to fully parse request body due to large argument count',\
    severity:2"

# ─── 请求体解析器 ─────────────────────────────────────────────
# 启用 XML 请求体解析
SecRule REQUEST_HEADERS:Content-Type "(?:application(?:/soap\+|/)|text/)xml" \
    "id:200000,phase:1,t:none,t:lowercase,pass,nolog,ctl:requestBodyProcessor=XML"

# 启用 JSON 请求体解析（AI API 全部为 JSON）
SecRule REQUEST_HEADERS:Content-Type "application/json" \
    "id:200001,phase:1,t:none,t:lowercase,pass,nolog,ctl:requestBodyProcessor=JSON"

# 请求体解析失败时拒绝（防止畸形请求绕过检查）
SecRule REQBODY_ERROR "!@eq 0" \
    "id:200002,phase:2,t:none,log,deny,status:400,\
    msg:'Failed to parse request body.',\
    logdata:'%{reqbody_error_msg}',severity:2"

# Multipart 严格验证（防止恶意文件上传绕过）
SecRule MULTIPART_STRICT_ERROR "!@eq 0" \
    "id:200003,phase:2,t:none,log,deny,status:400,\
    msg:'Multipart request body failed strict validation: \
PE %{REQBODY_PROCESSOR_ERROR}, \
BQ %{MULTIPART_BOUNDARY_QUOTED}, \
BW %{MULTIPART_BOUNDARY_WHITESPACE}, \
DB %{MULTIPART_DATA_BEFORE}, \
DA %{MULTIPART_DATA_AFTER}, \
HF %{MULTIPART_HEADER_FOLDING}, \
LF %{MULTIPART_LF_LINE}, \
SM %{MULTIPART_MISSING_SEMICOLON}, \
IQ %{MULTIPART_INVALID_QUOTING}, \
IP %{MULTIPART_INVALID_PART}, \
IH %{MULTIPART_INVALID_HEADER_FOLDING}, \
FL %{MULTIPART_FILE_LIMIT_EXCEEDED}'"

# Multipart 边界检测（防止边界欺骗攻击）
SecRule MULTIPART_UNMATCHED_BOUNDARY "@eq 1" \
    "id:200004,phase:2,t:none,log,deny,\
    msg:'Multipart parser detected a possible unmatched boundary.'"

# ─── 响应体处理 ───────────────────────────────────────────────
# 关闭响应体检查（AI 生成的长文本会严重影响性能）
# PCI-DSS 6.4.2 要求检查入站攻击，不强制出站
SecResponseBodyAccess Off

# ─── 文件上传 ─────────────────────────────────────────────────
# 临时文件目录
SecTmpDir /tmp/
SecDataDir /tmp/

# ─── 正则引擎限制（防 ReDoS）─────────────────────────────────
SecPcreMatchLimit 500000
SecPcreMatchLimitRecursion 500000

# ModSecurity 内部错误标志检查
SecRule TX:/^MSC_/ "!@streq 0" \
    "id:200005,phase:2,t:none,deny,\
    msg:'ModSecurity internal error flagged: %{MATCHED_VAR_NAME}'"

# ─── 默认拦截动作 ─────────────────────────────────────────────
# phase:1 = 请求头阶段，phase:2 = 请求体阶段
# deny = 拦截并返回 403
# status:403 = HTTP 状态码
# log = 记录到审计日志
SecDefaultAction "phase:1,log,auditlog,deny,status:403"
SecDefaultAction "phase:2,log,auditlog,deny,status:403"

# ─── 日志配置 ─────────────────────────────────────────────────
# 审计日志（PCI-DSS 10.2 要求记录安全事件）
SecAuditEngine RelevantOnly
# 记录被拦截和具有警告标志的请求
SecAuditLogRelevantStatus "^(?:5|4(?!04))"

# 审计日志包含的部分：
# A = 审计日志头  B = 请求头  I = 请求体（替代C，已处理）
# J = 请求体（JSON）  D = 响应体（中间）  E = 响应体（最终）
# F = 响应头  H = 审计日志附加信息  Z = 审计日志尾
SecAuditLogParts ABIJDEFHZ

# 并发日志模式（高并发场景推荐，每请求独立文件，避免锁争用）
SecAuditLogType Concurrent
SecAuditLog /www/wwwlogs/owasp/modsec_audit.log
SecAuditLogStorageDir /www/wwwlogs/owasp/

# 调试日志（生产环境设为 0 关闭；排查时改为 3 或 5）
# SecDebugLog /www/wwwlogs/owasp/debug.log
SecDebugLogLevel 0

# ─── 协议参数 ─────────────────────────────────────────────────
# 参数分隔符（标准 & 符号）
SecArgumentSeparator &

# Cookie 版本（0 = Netscape 风格，绝大多数应用使用）
SecCookieFormat 0

# ─── 服务器信息隐藏 ───────────────────────────────────────────
# 不在响应头暴露 ModSecurity 版本（CIS 安全配置）
SecServerSignature ""
SecStatusEngine Off

# ─── Unicode 映射 ─────────────────────────────────────────────
SecUnicodeMapFile unicode.mapping 20127
