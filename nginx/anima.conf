    location ^~ /admin/ {
        allow 172.16.1.0/24;
        deny all;

        limit_req zone=billing burst=10 nodelay;
        # FIX-5.37-3: 纵深防御——Nginx 层收紧 body 大小，与 Express 256kb 限制对齐
