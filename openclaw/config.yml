# =============================================================
# Anima 灵枢 · OpenClaw Agent 配置
# 部署节点：VPS B (172.16.1.2)
#
# 安全提示：所有 <占位符> 内容请替换为真实值后将文件权限设为 600：
#   chmod 600 /opt/openclaw/config.yml
# 推荐改用环境变量插值（${ENV_VAR}），避免密钥直接写入文件
# =============================================================

# ─── 服务器 ──────────────────────────────────────────────────
server:
  host: 172.16.1.2
  port: 3000

# ─── AI 推理（直接调用云端 API，用户自行选择模型）────────────
# 可用模型列表由 billing webhook 的 GET /models 接口返回。
# OpenClaw 将用户所选模型的 provider/modelName 字段用于此处路由。
llm:
  providers:
    - name: anthropic
      apiKey: ${ANTHROPIC_API_KEY}       # 通过环境变量注入，勿写死
      models:
        - claude-haiku-4-5-20251001      # 免费模型
        - claude-sonnet-4-5              # 付费模型
      timeout: 30
      maxRetries: 2

    - name: openai
      apiKey: ${OPENAI_API_KEY}
      baseUrl: https://api.openai.com/v1
      models:
        - gpt-4o-mini
        - gpt-4o
        - o1-mini
        - o3-mini
      timeout: 30
      maxRetries: 2

    # ── Google Gemini ─────────────────────────────────────────
    # 申请 API Key：https://aistudio.google.com/apikey
    - name: google
      apiKey: ${GOOGLE_API_KEY}
      baseUrl: https://generativelanguage.googleapis.com/v1beta/openai
      models:
        - gemini-2.5-pro-preview-05-06
        - gemini-2.0-flash
        - gemini-1.5-pro
        - gemini-1.5-flash
      timeout: 60
      maxRetries: 2

    # ── DeepSeek（深度求索）────────────────────────────────────
    # 申请 API Key：https://platform.deepseek.com/
    - name: deepseek
      apiKey: ${DEEPSEEK_API_KEY}
      baseUrl: https://api.deepseek.com/v1
      models:
        - deepseek-chat       # DeepSeek-V3，综合能力强，价格低
        - deepseek-reasoner   # DeepSeek-R1，推理模型
      timeout: 60
      maxRetries: 2

    # ── Qwen 通义千问（阿里云）────────────────────────────────
    # 申请 API Key：https://dashscope.aliyuncs.com/
    - name: qwen
      apiKey: ${QWEN_API_KEY}
      baseUrl: https://dashscope.aliyuncs.com/compatible-mode/v1
      models:
        - qwen-max            # 旗舰模型
        - qwen-plus           # 均衡型
        - qwen-turbo          # 速度最快，价格最低
        - qwen-long           # 超长上下文（1M tokens）
      timeout: 30
      maxRetries: 2

    # ── Moonshot / Kimi（月之暗面）────────────────────────────
    # 申请 API Key：https://platform.moonshot.cn/
    - name: moonshot
      apiKey: ${MOONSHOT_API_KEY}
      baseUrl: https://api.moonshot.cn/v1
      models:
        - moonshot-v1-8k
        - moonshot-v1-32k
        - moonshot-v1-128k
      timeout: 30
      maxRetries: 2

    # ── Zhipu AI / GLM（智谱清言）────────────────────────────
    # 申请 API Key：https://open.bigmodel.cn/
    - name: zhipu
      apiKey: ${ZHIPU_API_KEY}
      baseUrl: https://open.bigmodel.cn/api/paas/v4
      models:
        - glm-4-plus          # 旗舰模型
        - glm-4-flash         # 免费模型，速度快
        - glm-4-air           # 高性价比
      timeout: 30
      maxRetries: 2

    # ── xAI / Grok ────────────────────────────────────────────
    # 申请 API Key：https://console.x.ai/
    - name: xai
      apiKey: ${XAI_API_KEY}
      baseUrl: https://api.x.ai/v1
      models:
        - grok-3
        - grok-3-fast
        - grok-2-latest
      timeout: 30
      maxRetries: 2

    # ── Groq（快速推理，免费层）──────────────────────────────
    # 申请 API Key：https://console.groq.com/
    - name: groq
      apiKey: ${GROQ_API_KEY}
      baseUrl: https://api.groq.com/openai/v1
      models:
        - llama-3.3-70b-versatile
        - llama-3.1-8b-instant
        - mixtral-8x7b-32768
        - gemma2-9b-it
      timeout: 30
      maxRetries: 2

    - name: mistral
      apiKey: ${MISTRAL_API_KEY}
      models:
        - mistral-small-latest
      timeout: 30
      maxRetries: 2

  # 默认模型（未指定时使用此模型）
  defaultProvider: anthropic
  defaultModel: claude-haiku-4-5-20251001

# ─── 本地模型接口（保留定义，当前不启用）─────────────────────
# 如需重新启用本地 Ollama，将 enabled 改为 true 并在 api_models
# 表中执行：UPDATE api_models SET is_active=true WHERE provider='ollama';
ollama:
  enabled: false
  baseUrl: http://172.16.1.5:11434
  models:
    - qwen2.5:7b-instruct-q4_K_M
    - llama3.2:3b

# ─── 计费 Webhook（向 CXI4 汇报每次 API 调用）────────────────
billing:
  enabled: true
  webhookUrl: http://172.16.1.5:3002/billing/record
  # 调用 /models 接口获取最新定价列表，每 5 分钟缓存一次
  modelsCacheUrl: http://172.16.1.5:3002/models
  modelsCacheTtl: 300

# ─── 记忆数据库 ───────────────────────────────────────────────
memory:
  enabled: true
  database: postgresql://animaapp:${PG_PASSWORD}@anima-db.postgres.database.azure.com:5432/openclaw?sslmode=require

# ─── Redis 缓存（复用 CXI4 的 Redis）────────────────────────
redis:
  url: redis://:${REDIS_PASSWORD}@172.16.1.5:6379
  sessionTtl: 3600  # 对话上下文缓存 TTL（秒）

# ─── 工具配置 ─────────────────────────────────────────────────
tools:
  search:
    enabled: true
    provider: duckduckgo
    maxResults: 5

  calendar:
    enabled: true
    provider: nextcloud
    url: http://172.16.1.4:8090/remote.php/dav/calendars/admin/anima/
    username: admin
    password: ${NEXTCLOUD_PASSWORD}

  homeassistant:
    enabled: true
    baseUrl: http://172.16.1.5:8123
    token: ${HA_TOKEN}

  voice:
    recognition:
      url: http://172.16.1.5:8080/transcribe
    synthesis:
      url: http://172.16.1.1:8082/api/tts
