# =============================================================
# Anima 灵枢 · 用户网盘模块（WebDAV）
# 部署节点：VPS D (172.16.1.4)
#
# ⚠️  本模块不包含独立服务。
#     网盘 WebDAV 功能由 modules/nextcloud/ 的 Nextcloud 实例提供。
#     如已通过 calendar 模块或 nextcloud 模块部署了 Nextcloud，无需重复部署。
#
# 部署步骤：
#   1. 先部署 modules/nextcloud/（必须在本模块之前）
#      cd ../nextcloud && docker compose up -d
#   2. 通过 https://<域名>/nextcloud/ 登录 Nextcloud 即可使用网盘
#   3. 本模块无需额外 docker compose 操作
# =============================================================

# WebDAV 由 modules/nextcloud/ 提供，Nextcloud 29 内置 WebDAV，无需单独部署。
# 使用 include 引用共享 Nextcloud 模块
include:
  - path: ../nextcloud/docker-compose.yml

