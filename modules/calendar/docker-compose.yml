# =============================================================
# Anima 灵枢 · 日历管理模块（CalDAV）
# 部署节点：VPS D (172.16.1.4)
#
# ⚠️  本模块不包含独立服务。
#     日历 CalDAV 功能由 modules/nextcloud/ 的 Nextcloud 实例提供。
#
# 部署步骤：
#   1. 先部署 modules/nextcloud/（必须在本模块之前）
#      cd ../nextcloud && docker compose up -d
#   2. 在 openclaw/config.yml 中确认 tools.calendar 配置指向 Nextcloud：
#      url: http://172.16.1.4:8090/remote.php/dav/calendars/admin/anima/
#   3. 本模块无需额外 docker compose 操作
# =============================================================

# CalDAV 由 modules/nextcloud/ 提供，Nextcloud 29 内置 CalDAV，无需单独部署。
# 使用 include 引用共享 Nextcloud 模块
include:
  - path: ../nextcloud/docker-compose.yml

