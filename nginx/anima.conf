# =============================================================
# Anima 灵枢 · Nginx 反向代理配置
# VPS A (172.16.1.1) · 对外唯一入口
# 特性：HTTPS / HTTP2 / 安全头 / 限速 / 缓存 / ModSecurity WAF
#
# 合规：CIS Controls v8 / PCI-DSS v4.0
#   · ModSecurity + OWASP CRS 满足 PCI-DSS 6.4.1/6.4.2 WAF 要求
#   · TLS 1.2/1.3 + HSTS 满足 PCI-DSS 4.2.1 传输加密要求
#   · 安全头满足 CIS §13 网络监控与防御要求
# =============================================================

# ─── 全局 ────────────────────────────────────────────────────
# （以下指令放在 nginx.conf 的 http{} 块中或通过 include 引入）

# ─── ModSecurity WAF（PCI-DSS 6.4.1 / CIS 13）────────────────
# 启用 ModSecurity WAF 引擎
# 入口文件由安装脚本部署至 /opt/owasp/conf/main.conf
# 安装脚本：https://raw.githubusercontent.com/mzwrt/system_script/refs/heads/main/nginx/nginx-install.sh
modsecurity on;
modsecurity_rules_file /opt/owasp/conf/main.conf;

# 隐藏 Nginx 版本号（减少信息泄露）
server_tokens off;

# Brotli 压缩（需 ngx_brotli 模块；如果不可用，仅 gzip 也足够）
# brotli on;
# brotli_comp_level 6;
# brotli_types text/plain text/css application/json application/javascript
#              text/xml application/xml application/xml+rss text/javascript;

# Gzip 压缩
gzip            on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied    any;
gzip_vary       on;
gzip_types
    text/plain
    text/css
    text/javascript
    application/json
    application/javascript
    application/x-javascript
    text/xml
    application/xml
    application/xml+rss
    image/svg+xml;

# 共享内存：限速区 / SSL 会话
limit_req_zone  $binary_remote_addr zone=api:10m  rate=30r/m;   # API 30次/分
limit_req_zone  $binary_remote_addr zone=login:10m rate=5r/m;   # 登录 5次/分
limit_req_zone  $binary_remote_addr zone=tts:10m   rate=10r/m;  # TTS 10次/分
limit_conn_zone $binary_remote_addr zone=perip:10m;             # 并发连接数

# 客户端连接超时
client_body_timeout    12s;
client_header_timeout  12s;
keepalive_timeout      65s;
send_timeout           10s;

# =============================================================
# HTTP → HTTPS 强制跳转
# =============================================================
server {
    listen      80;
    listen      [::]:80;
    server_name <你的域名>;

    # Let's Encrypt ACME 验证（certbot 续期需要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================
# HTTPS 主站
# =============================================================
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;           # Nginx 1.25.1+ 语法；旧版用 listen 443 ssl http2
    server_name <你的域名>;

    # ─── SSL 证书 ─────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/<你的域名>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<你的域名>/privkey.pem;

    # Mozilla 推荐的现代 TLS 配置（仅 TLS 1.2/1.3）
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:20m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP Stapling（加速 TLS 握手）
    ssl_stapling        on;
    ssl_stapling_verify on;
    # ssl_trusted_certificate 提供 Let's Encrypt 中间 CA 链，用于验证 OCSP 响应签名（CIS TLS）
    ssl_trusted_certificate /etc/letsencrypt/live/<你的域名>/chain.pem;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ─── 安全响应头 ───────────────────────────────────────────
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY"                                          always;
    add_header X-Content-Type-Options     "nosniff"                                       always;
    add_header X-XSS-Protection           "1; mode=block"                                 always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss://$server_name; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';"
        always;

    # ─── 全局限制 ─────────────────────────────────────────────
    limit_conn perip 20;               # 每 IP 最多 20 个并发连接
    client_max_body_size 50m;

    # ─── LibreChat 主界面 ────────────────────────────────────
    location / {
        proxy_pass         http://172.16.1.3:3080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_hide_header  X-Powered-By;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;
    }

    # ─── LibreChat API（含 AI 推理，单独限速）────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://172.16.1.3:3080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_hide_header  X-Powered-By;
        proxy_read_timeout 300s;   # AI 推理可能需要较长时间
        proxy_buffering    off;    # 流式回复不缓冲

        # PCI-DSS: 禁止缓存含敏感数据的 API 响应
        add_header Cache-Control "no-store" always;
        # SEO: 防止搜索引擎索引 API 接口
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # ─── 登录接口单独限速（防暴力破解）──────────────────────
    location /api/auth/ {
        limit_req zone=login burst=3 nodelay;

        proxy_pass        http://172.16.1.3:3080;
        proxy_http_version 1.1;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;

        # PCI-DSS: 禁止缓存认证响应
        add_header Cache-Control "no-store" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # ─── OpenClaw Agent API ───────────────────────────────────
    location /api/agent/ {
        proxy_pass         http://172.16.1.2:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;
        proxy_read_timeout 120s;

        add_header Cache-Control "no-store" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # ─── Coqui TTS 语音合成（本机，单独限速）─────────────────
    location /tts/ {
        limit_req zone=tts burst=5 nodelay;

        proxy_pass         http://127.0.0.1:8082/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;

        add_header Cache-Control "no-store" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # ─── Whisper 语音识别（CXI4）─────────────────────────────
    location /whisper/ {
        proxy_pass         http://172.16.1.5:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;
        client_max_body_size 20m;
        proxy_read_timeout   60s;

        add_header Cache-Control "no-store" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # ─── 订阅激活（Webhook）──────────────────────────────────
    location = /activate {
        proxy_pass         http://172.16.1.5:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;

        add_header Cache-Control "no-store" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # ─── Nextcloud（日历 CalDAV / 网盘 WebDAV 模块）────────────
    # 启用条件：modules/modules.yml 中 calendar 或 cloud_storage 为 enabled
    location /nextcloud/ {
        proxy_pass         http://172.16.1.4:8090/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;
        client_max_body_size 1g;   # 网盘大文件上传
        proxy_read_timeout 300s;

        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # ─── 静态资源缓存 ─────────────────────────────────────────
    location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|ico|svg)$ {
        proxy_pass      http://172.16.1.3:3080;
        proxy_set_header Host $host;
        # 浏览器缓存 7 天
        expires         7d;
        add_header      Cache-Control "public, immutable" always;
        # 重复安全头（nginx add_header 不继承含有 add_header 的子 location）
        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss://$server_name; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';"
            always;
    }

    # ─── 隐藏内部服务的直接访问 ──────────────────────────────
    location ~ ^/(health|billing|admin)(/|$) {
        return 403;
    }

    # ─── 阻止常见扫描路径 ─────────────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }
    location ~ /\. {
        deny all;
    }
}
