# =============================================================
# Anima 灵枢 · CRS 后置排除规则
# 在 OWASP CRS 核心规则集加载之后执行
#
# 目的：
#   覆盖 CRS 规则的默认行为（如修改动作、抑制特定误报）
#   这些规则必须在 CRS 加载后才能生效
#
# 注意：
#   · 后置排除规则使用 SecRuleUpdateActionById 修改已加载的规则
#   · 前置排除规则使用 ctl: 动作在请求时动态决定
#   · 两者配合使用以最小化误报
# =============================================================

# ─── 1. AI API 流式响应排除 ──────────────────────────────────
# CRS 950xxx 系列：出站数据泄露检测
# AI 生成的文本可能包含看似敏感的模式（如代码中的连接字符串示例）
# 由于已关闭 SecResponseBodyAccess，此处作为额外保险

# 规则 951xxx: SQL 信息泄露 — AI 可能输出 SQL 示例
SecRuleUpdateActionById 951100-951999 "pass,nolog"

# 规则 953xxx: PHP 信息泄露 — AI 可能输出 PHP 代码
SecRuleUpdateActionById 953100-953999 "pass,nolog"

# 规则 954xxx: Java 信息泄露 — AI 可能输出 Java 代码
SecRuleUpdateActionById 954100-954999 "pass,nolog"

# ─── 2. 请求体解析错误宽容处理 ───────────────────────────────
# 规则 920xxx: 多部分请求体解析严格模式
# 某些客户端（特别是移动端浏览器）发送的 multipart 边界
# 可能不完全符合 RFC，降为警告而非拦截
SecRuleUpdateActionById 920400 "pass,log"
