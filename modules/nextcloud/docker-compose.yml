# =============================================================
# Anima 灵枢 · Nextcloud 基础设施模块（必选）
# 部署节点：VPS D (172.16.1.4) — 香港 Azure
#
# 说明：此服务同时为以下两个功能模块提供后端支持：
#   - 日历管理（CalDAV 协议，同步手机/电脑日历）
#   - 用户网盘（WebDAV 协议，多设备文件同步）
#
# 依赖：calendar 模块与 cloud-storage 模块均依赖本模块，
#       部署任意一个前必须先启动本模块。
#
# 资源说明：VPS D 与 Azure PostgreSQL 同在香港机房，
#   数据库查询延迟 <1ms，文件元数据操作极快。
#   1 GB VPS 分配 512m 给 Nextcloud，系统预留 ~500 MB。
# =============================================================

services:
  nextcloud:
    image: nextcloud:29-apache
    container_name: anima-nextcloud
    restart: unless-stopped

    # VPS D (1GB)：Nextcloud 512m — 日历 CalDAV + 网盘 WebDAV
    mem_limit: 512m
    mem_reservation: 256m
    cpus: '1.5'

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    pids_limit: 200

    ports:
      - "172.16.1.4:8090:80"

    volumes:
      - nextcloud_data:/var/www/html            # 应用数据（主目录）
      - nextcloud_files:/var/www/html/data      # 用户文件存储（WebDAV 网盘）
      - ./config:/var/www/html/config           # 自定义配置覆盖

    environment:
      POSTGRES_HOST: anima-db.postgres.database.azure.com
      POSTGRES_DB: nextcloud
      POSTGRES_USER: animaapp
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_USERNAME:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: "172.16.1.4 ${NEXTCLOUD_DOMAIN:-localhost}"
      PHP_MEMORY_LIMIT: 256M
      PHP_UPLOAD_LIMIT: 512M
      TZ: Asia/Shanghai

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  nextcloud_data:    # Nextcloud 应用数据
  nextcloud_files:   # 用户上传文件（CalDAV + WebDAV 共用）
