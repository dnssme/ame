# =============================================================
# Anima 灵枢 · OpenClaw Agent Docker Compose
# 部署节点：VPS B (172.16.1.2) · 双核 1 GB RAM
# 同节点还运行 ClawBot / Telegram / WeChat Bot，需合理分配内存
# =============================================================

services:
  openclaw:
    build: .
    container_name: openclaw
    restart: unless-stopped

    # VPS B 1GB：OpenClaw 450m + ClawBot 192m = 642m → 系统留 ~382m
    # 若同时启用 Telegram 128m + WeChat 192m，建议升级至 2GB RAM
    mem_limit: 450m
    mem_reservation: 200m
    # CPU 限制（CIS 2.4 防止资源耗尽）
    cpus: '1.5'
    pids_limit: 200

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp

    # 只绑定内网 IP
    ports:
      - "172.16.1.2:3000:3000"

    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./data:/app/data

    # API Key 等敏感变量从 .env 文件加载（docker compose 自动读取同目录 .env）
    env_file:
      - path: ./.env
        required: true

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=320"
      TZ: Asia/Shanghai

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── ClawBot 灵枢接入通道（微信/企业微信 Webhook）──────────
  # 独立于 OpenClaw，接收微信消息并桥接到 OpenClaw API
  clawbot:
    build: ../modules/clawbot
    container_name: anima-clawbot
    restart: unless-stopped

    mem_limit: 192m
    mem_reservation: 96m
    cpus: '0.8'
    pids_limit: 100

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp

    ports:
      - "172.16.1.2:3004:3004"

    env_file:
      - path: ../modules/clawbot/.env
        required: true

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=128"
      TZ: Asia/Shanghai
      PORT: "3004"
      HOST: "0.0.0.0"

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
