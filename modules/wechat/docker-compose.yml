# =============================================================
# Anima 灵枢 · 微信接入模块
# 部署节点：VPS-B (172.16.1.2) · 双核 1 GB RAM
# 与 OpenClaw + Telegram Bot 共享节点
# =============================================================

services:
  wechat-bot:
    build: .
    container_name: anima-wechat
    restart: unless-stopped

    # VPS B 1GB 共享：WeChat 192m（Wechaty 需要较多内存用于 Puppet）
    mem_limit: 192m
    mem_reservation: 80m
    cpus: '0.5'
    pids_limit: 80

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp

    env_file:
      - path: ./.env
        required: true

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=128"
      TZ: Asia/Shanghai

    volumes:
      - ./data:/app/data    # Wechaty 登录态持久化

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
