# =============================================================
# Anima 灵枢 · 模块注册表
# 中央模块配置——启用/禁用任意功能模块
#
# 使用方法：
#   1. 将 enabled 改为 true/false 控制模块启停
#   2. 每个模块目录包含独立的 docker-compose.yml / .env.example / README.md
#   3. 启用模块后，按模块目录内 README.md 部署即可
#   4. 禁用模块时 docker compose down 或停止对应服务即可
# =============================================================

# ─── 基础设施模块（必选，所有功能的底层依赖）──────────────────
infrastructure:
  nextcloud:
    enabled: true
    required: true
    description: "私有云平台（日历 CalDAV + 网盘 WebDAV 的底层，calendar/cloud-storage 必须先部署此模块）"
    node: VPS-D
    path: ./nextcloud/

# ─── 核心模块（默认已部署）──────────────────────────────────
core:
  chat:
    enabled: true
    description: "日常 AI 对话（LibreChat Web UI）"
    node: VPS-C
    path: ../librechat/

  agent:
    enabled: true
    description: "AI 推理后端（OpenClaw Agent）"
    node: VPS-B
    path: ../openclaw/

  billing:
    enabled: true
    description: "订阅收费系统（Webhook 计费服务）"
    node: VPS-E
    path: ../webhook/

# ─── 通讯渠道模块 ──────────────────────────────────────────
channels:
  wechat:
    enabled: false
    description: "微信接入（基于 wechaty）"
    node: VPS-B
    path: ./wechat/
    depends_on: [agent]

  telegram:
    enabled: false
    description: "Telegram 接入（基于 telegraf）"
    node: VPS-B
    path: ./telegram/
    depends_on: [agent]

  clawbot:
    enabled: true
    version: "2.7.0"
    description: "微信 ClawBot 灵枢接入通道 (v2.7)
      - Web 管理后台（唯一管理入口 /clawbot/admin）
      - 管理后台会话管理（Redis + PostgreSQL 双写/CSRF/IP 绑定）
      - 灵枢通道网关（通道注册/发现/能力矩阵/心跳监控）
      - 接入向导 /setup（分步引导普通用户完成全流程）
      - Webhook 事件中继（第三方订阅/HMAC-SHA256 签名/投递追踪）
      - 跨通道会话联邦（WeChat ↔ WeCom 会话关联/审计）
      - PCI-DSS/CIS 实时合规监控（漂移检测/趋势分析）
      - 多租户隔离/API 密钥管理/插件心跳/能力协商/合规历史
      - 自助激活/企业运维增强/持续合规监控
      - 插件验证挑战-响应（官方 ClawBot 插件商店认证）
      - 用户隐私同意管理（PCI-DSS v4.0 / GDPR 合规）
      - 用户偏好设置（语言/通知/语音回复）
      - CIS v8 安全头增强（HSTS/CSP/Permissions-Policy）
      - 数据隔离增强（Redis 命名空间校验/插件状态清理）
      - 合规性报告端点（PCI-DSS v4.0 / CIS v8 自检）
      - 插件健康仪表板（依赖健康检查/响应延迟监控）
      - 官方 ClawBot 插件清单端点 + 插件状态端点
      - 插件生命周期事件（activate/deactivate/update）
      - 会话静态加密 AES-256-GCM（PCI-DSS 3.4）
      - OAuth2.0 网页授权 + 签名验证 + AES 加解密 + 消息去重
      - 菜单管理 + 用户管理 + 强制认证 + 用户隔离
      - Per-user 速率限制 + 管理端点限速 + 就绪探针
      - IP 白名单 + Redis 会话持久化 + 用户封禁管理
      - 数据导出 + 用户资料获取 + 增强菜单事件
      - PostgreSQL 审计日志持久化 + 登录锁定 + 空闲超时
      - 审计查询端点 + 日志保留策略 + 用户搜索筛选
      - 功能导航 + Nginx 反向代理 + 全功能整合
      - JS-SDK 签名配置 + 用户标签管理 + 群发广播消息
      - 永久素材管理 + 数据统计分析代理
      - 模板消息 API + 客服会话转接 + 快捷回复规则管理
      - 小程序卡片消息 + 统一工具入口 + 敏感操作二次确认
      - 模板消息送达回调 + 群发完成回调 + 快捷回复认证修复
      - 企业级运维 + PCI-DSS v4.0/CIS v8，含企业微信接口但默认不启用"
    node: VPS-B
    path: ./clawbot/
    depends_on: [agent]

  email:
    enabled: true
    description: "邮件处理（IMAP 收件 + SMTP 发件 + AI 分析）"
    node: CXI4
    path: ./email/
    depends_on: [agent]

# ─── 工具模块 ──────────────────────────────────────────────
tools:
  voice:
    enabled: true
    description: "语音交互（Whisper STT + Coqui TTS，均部署在 CXI4）"
    node: CXI4
    path: ./voice/
    depends_on: [agent]

  web_search:
    enabled: true
    description: "网页搜索（DuckDuckGo）"
    node: VPS-B
    path: ./web-search/
    depends_on: [agent]

  file_analysis:
    enabled: true
    description: "文件分析（LibreChat 文件上传 + AI 解析）"
    node: VPS-C
    path: ./file-analysis/
    depends_on: [chat]

  calendar:
    enabled: true
    description: "日历管理（Nextcloud CalDAV 同步手机/Web）"
    node: VPS-D
    path: ./calendar/
    depends_on: [nextcloud, agent]

  smart_home:
    enabled: true
    description: "智能家居控制（Home Assistant Core 运行在 CXI4）"
    node: CXI4
    path: ./smart-home/
    depends_on: [agent]

  cloud_storage:
    enabled: true
    description: "用户网盘（Nextcloud WebDAV）"
    node: VPS-D
    path: ./cloud-storage/
    depends_on: [nextcloud, agent]

# ─── 客户端模块 ──────────────────────────────────────────────
clients:
  mobile_app:
    enabled: false
    description: "独立手机 APP（Flutter，兼容 iOS/Android）"
    path: ../mobile/
    depends_on: [chat, agent]
