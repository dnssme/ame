# =============================================================
# Anima 灵枢 · CRS 前置排除规则
# 在 OWASP CRS 核心规则集加载之前执行
#
# 目的：
#   为应用特定的合法请求排除可能的误报规则，
#   同时保持 CIS/PCI-DSS 要求的全量安全检查
#
# 原则：
#   · 排除范围尽可能小（按路径 + 规则 ID 精确排除）
#   · 每条排除规则附带注释说明原因
#   · 定期审查排除列表，移除不再需要的条目
# =============================================================

# ─── 1. AI 聊天 API (/api/) ──────────────────────────────────
# AI 聊天请求体中可能包含各种用户输入文本（含代码片段、
# SQL 示例、HTML 标签等），这些是合法的对话内容而非攻击。
# 排除请求体相关的 SQLi/XSS 规则，但保留请求头/URL 检查。

# 规则 941xxx: XSS 检测 — 用户可能讨论 HTML/JS 代码
SecRule REQUEST_URI "^/api/(chat|ask|message)" \
    "id:1000010,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    ctl:ruleRemoveTargetById=941100-941999;ARGS:text,\
    ctl:ruleRemoveTargetById=941100-941999;ARGS:content,\
    ctl:ruleRemoveTargetById=941100-941999;ARGS:message"

# 规则 942xxx: SQLi 检测 — 用户可能讨论 SQL 查询
SecRule REQUEST_URI "^/api/(chat|ask|message)" \
    "id:1000020,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    ctl:ruleRemoveTargetById=942100-942999;ARGS:text,\
    ctl:ruleRemoveTargetById=942100-942999;ARGS:content,\
    ctl:ruleRemoveTargetById=942100-942999;ARGS:message"

# 规则 932xxx: RCE 检测 — 用户可能讨论 shell 命令
SecRule REQUEST_URI "^/api/(chat|ask|message)" \
    "id:1000030,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    ctl:ruleRemoveTargetById=932100-932999;ARGS:text,\
    ctl:ruleRemoveTargetById=932100-932999;ARGS:content,\
    ctl:ruleRemoveTargetById=932100-932999;ARGS:message"

# ─── 2. Webhook 计费 API (/activate, /billing/) ──────────────
# 计费请求的 JSON body 为固定结构，但 description 字段可能
# 包含用户可读文本；邮箱地址中的 @ 和 + 可能触发规则。

# 规则 942xxx: SQLi — cardKey 字段（如 ANIMA-TOP20-DEMO）可能匹配 SQL 关键字
SecRule REQUEST_URI "^/activate$" \
    "id:1000100,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    ctl:ruleRemoveTargetById=942100-942999;ARGS:cardKey"

# 规则 920xxx: 协议违反 — /billing/record JSON 的数值字段不会触发，
# 但 description 中的特殊字符可能触发编码检查
SecRule REQUEST_URI "^/billing/record$" \
    "id:1000110,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    ctl:ruleRemoveTargetById=920270-920272;ARGS:description"

# ─── 3. 管理员 API (/admin/) ─────────────────────────────────
# 管理员接口已有 ADMIN_TOKEN 鉴权保护，排除 description 字段
# 的内容检查（管理员备注可能包含技术术语）

SecRule REQUEST_URI "^/admin/" \
    "id:1000200,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    ctl:ruleRemoveTargetById=941100-941999;ARGS:description,\
    ctl:ruleRemoveTargetById=942100-942999;ARGS:description,\
    ctl:ruleRemoveTargetById=932100-932999;ARGS:description"

# ─── 4. WebSocket 升级 ───────────────────────────────────────
# LibreChat 使用 WebSocket 进行流式推送，Upgrade 头合法
# 规则 920280: Request is Missing a Host Header (WebSocket)
SecRule REQUEST_HEADERS:Upgrade "websocket" \
    "id:1000300,\
    phase:1,\
    pass,\
    t:none,t:lowercase,\
    nolog,\
    ctl:ruleRemoveById=920280"

# ─── 5. 语音上传 (/whisper/) ─────────────────────────────────
# Whisper 语音识别接收二进制音频文件（multipart/form-data）
# 完全跳过请求体检查以避免误报和性能影响
SecRule REQUEST_URI "^/whisper/" \
    "id:1000400,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    ctl:ruleEngine=Off"

# ─── 6. TTS 语音合成 (/tts/) ─────────────────────────────────
# TTS 请求体为简短文本，但可能包含各种自然语言内容
# 排除请求体的 XSS/SQLi 检查
SecRule REQUEST_URI "^/tts/" \
    "id:1000500,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    ctl:ruleRemoveTargetById=941100-941999;ARGS:text,\
    ctl:ruleRemoveTargetById=942100-942999;ARGS:text"

# ─── 7. 静态资源 ─────────────────────────────────────────────
# 静态资源（JS/CSS/图片）无需 WAF 检查，跳过以提升性能
SecRule REQUEST_URI "\.(js|css|woff2?|png|jpg|jpeg|gif|ico|svg)$" \
    "id:1000600,\
    phase:1,\
    pass,\
    t:none,t:lowercase,\
    nolog,\
    ctl:ruleEngine=Off"

# ─── 8. 健康检查 (/health) ───────────────────────────────────
# 内部健康检查无需 WAF 审计（减少日志噪声）
SecRule REQUEST_URI "^/health$" \
    "id:1000700,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    ctl:ruleEngine=Off,\
    ctl:auditEngine=Off"
