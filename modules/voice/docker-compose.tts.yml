# =============================================================
# Anima 灵枢 · Coqui TTS 语音合成
# 部署节点：CXI4 (172.16.1.5)
# 模型：中文 Baker（tacotron2-DDC-GST），延迟 <100ms
# =============================================================

services:
  tts:
    image: ghcr.io/coqui-ai/tts:latest
    container_name: anima-tts
    restart: unless-stopped

    mem_limit: 768m
    mem_reservation: 384m
    cpus: '1.0'

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 100

    ports:
      - "172.16.1.5:8082:5002"

    environment:
      TZ: Asia/Shanghai

    command: >
      --model_name tts_models/zh-CN/baker/tacotron2-DDC-GST

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
