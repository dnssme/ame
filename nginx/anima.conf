# =============================================================
# Anima 灵枢 · Nginx 反向代理配置
# VPS A (172.16.1.1) · 对外唯一入口
# 特性：HTTPS / HTTP2 / 安全头 / 限速 / 缓存 / ModSecurity WAF
#
# 合规：CIS Controls v8 / PCI-DSS v4.0
#
# 修复记录：
#   v1.2  新增独立 billingCheck 限速区（120r/m）
#         原 billing 区仅 60r/m，与 server.js billingCheckLimiter（120/m）
#         不一致，nginx 成为 /billing/check 的不必要瓶颈。
#         AI 对话高频预检场景（如每秒 1 条消息）会提前触发 429。
#         修复：/billing/check 改用独立 billingCheck 区，与服务端保持一致。
#   v1.1  添加 access_log / error_log 显式配置
#   v1.1  /tts/ 添加 proxy_read_timeout 120s
# =============================================================

# ─── ModSecurity WAF（PCI-DSS 6.4.1 / CIS 13）────────────────
modsecurity on;
modsecurity_rules_file /opt/owasp/conf/main.conf;

# 隐藏 Nginx 版本号
server_tokens off;

# Gzip 压缩
gzip            on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied    any;
gzip_vary       on;
gzip_types
    text/plain
    text/css
    text/javascript
    application/json
    application/javascript
    application/x-javascript
    text/xml
    application/xml
    application/xml+rss
    image/svg+xml;

# 共享内存：限速区 / SSL 会话
# API/AI 推理：30次/分（每 IP）
limit_req_zone  $binary_remote_addr zone=api:10m     rate=30r/m;
# 登录接口：5次/分（防暴力破解）
limit_req_zone  $binary_remote_addr zone=login:10m   rate=5r/m;
# TTS 语音合成：10次/分
limit_req_zone  $binary_remote_addr zone=tts:10m     rate=10r/m;
# Whisper 语音识别：10次/分
limit_req_zone  $binary_remote_addr zone=whisper:10m rate=10r/m;
# 计费只读接口（余额查询/历史/模型列表）：60次/分
limit_req_zone  $binary_remote_addr zone=billing:10m rate=60r/m;
# v1.2 FIX: /billing/check 预检专用区：120次/分
# 每次 AI 对话前必须调用此接口，60r/m 会在高频对话时成为瓶颈。
# 与 webhook/server.js 的 billingCheckLimiter（120/m）保持一致。
limit_req_zone  $binary_remote_addr zone=billingCheck:10m rate=120r/m;
# 并发连接数限制
limit_conn_zone $binary_remote_addr zone=perip:10m;

# 客户端连接超时
client_body_timeout    12s;
client_header_timeout  12s;
keepalive_timeout      65s;
send_timeout           10s;

# =============================================================
# HTTP → HTTPS 强制跳转
# =============================================================
server {
    listen      80;
    listen      [::]:80;
    server_name <你的域名>;

    # Let's Encrypt ACME 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================
# HTTPS 主站
# =============================================================
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name <你的域名>;

    # ─── 日志配置（v1.1）────────────────────────────────────
    access_log /opt/nginx/logs/anima_access.log combined;
    error_log  /opt/nginx/logs/anima_error.log warn;

    # ─── SSL 证书 ─────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/<你的域名>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<你的域名>/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:20m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP Stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/<你的域名>/chain.pem;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ─── 安全响应头 ───────────────────────────────────────────
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY"                                          always;
    add_header X-Content-Type-Options     "nosniff"                                       always;
    add_header X-XSS-Protection           "1; mode=block"                                 always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss://$server_name; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';"
        always;

    # ─── 全局限制 ─────────────────────────────────────────────
    limit_conn perip 20;
    client_max_body_size 50m;

    # ─── LibreChat 主界面 ────────────────────────────────────
    location / {
        proxy_pass         http://172.16.1.3:3080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_hide_header  X-Powered-By;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;
    }

    # ─── LibreChat API（含 AI 推理，单独限速）────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://172.16.1.3:3080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_hide_header  X-Powered-By;
        proxy_read_timeout 300s;
        proxy_buffering    off;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"    always;
    }

    # ─── 登录接口单独限速（防暴力破解）──────────────────────
    location /api/auth/ {
        limit_req zone=login burst=3 nodelay;

        proxy_pass        http://172.16.1.3:3080;
        proxy_http_version 1.1;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"    always;
    }

    # ─── OpenClaw Agent API ───────────────────────────────────
    location /api/agent/ {
        proxy_pass         http://172.16.1.2:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;
        proxy_read_timeout 120s;
        proxy_buffering    off;
        proxy_cache        off;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"    always;
    }

    # ─── Coqui TTS 语音合成（CXI4，单独限速）──────────────────
    # v1.1 修复：添加 proxy_read_timeout 120s（长文本 TTS 生成防超时）
    location /tts/ {
        limit_req zone=tts burst=5 nodelay;

        proxy_pass         http://172.16.1.5:8082/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;
        proxy_read_timeout 120s;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"    always;
    }

    # ─── Whisper 语音识别（CXI4，单独限速）─────────────────────
    location /whisper/ {
        limit_req zone=whisper burst=5 nodelay;

        proxy_pass         http://172.16.1.5:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;
        client_max_body_size 20m;
        proxy_read_timeout   60s;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"    always;
    }

    # ─── 订阅激活（Webhook）──────────────────────────────────
    location = /activate {
        proxy_pass         http://172.16.1.6:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"    always;
    }

    # ─── Nextcloud（日历 CalDAV / 网盘 WebDAV 模块）────────────
    location /nextcloud/ {
        proxy_pass         http://172.16.1.4:8090/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;
        client_max_body_size 1g;
        proxy_read_timeout 300s;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "SAMEORIGIN"                                    always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';"
            always;
    }

    # ─── 静态资源缓存 ─────────────────────────────────────────
    location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|ico|svg)$ {
        proxy_pass         http://172.16.1.3:3080;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_hide_header  X-Powered-By;
        expires         7d;
        add_header      Cache-Control "public, immutable" always;
        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss://$server_name; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';"
            always;
    }

    # ─── 用户计费接口（Webhook）────────────────────────────────

    # 屏蔽内部/管理接口（纵深防御）
    location ~ ^/(health|admin)(/|$) {
        return 403;
    }

    # 屏蔽 /billing/record 外部访问（仅供 OpenClaw 等内部服务直连 VPS-E 调用）
    location = /billing/record {
        return 403;
    }

    # 用户余额查询
    location /billing/balance {
        limit_req zone=billing burst=30 nodelay;

        proxy_pass         http://172.16.1.6:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"    always;
    }

    # 用户消费历史
    location /billing/history {
        limit_req zone=billing burst=30 nodelay;

        proxy_pass         http://172.16.1.6:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"    always;
    }

    # 预检余额
    # v1.2 FIX: 改用 billingCheck 区（120r/m），替代原 billing 区（60r/m）
    # 每条 AI 消息发出前都会调用此接口，60r/m 会在每秒 1 条消息时触发限速
    location = /billing/check {
        limit_req zone=billingCheck burst=40 nodelay;

        proxy_pass         http://172.16.1.6:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"    always;
    }

    # 查询可用模型
    location = /models {
        limit_req zone=billing burst=20 nodelay;

        proxy_pass         http://172.16.1.6:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"    always;
    }

    # ─── 阻止常见扫描路径 ─────────────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }
    location ~ /\. {
        deny all;
    }
}
