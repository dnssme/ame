# =============================================================
# Anima 灵枢 · 微信 ClawBot 插件接入模块
# 部署节点：VPS-B (172.16.1.2) · 双核 1 GB RAM
# 与 OpenClaw + WeChat Bot + Telegram Bot 共享节点
# =============================================================

services:
  clawbot:
    build: .
    container_name: anima-clawbot
    restart: unless-stopped

    # VPS B 1GB 共享：ClawBot 128m（轻量 HTTP 桥接）
    mem_limit: 128m
    mem_reservation: 48m
    cpus: '0.5'
    pids_limit: 50

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp

    ports:
      - "172.16.1.2:3004:3004"

    env_file:
      - path: ./.env
        required: true

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=96"
      TZ: Asia/Shanghai

    volumes:
      - ./data:/app/data

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
