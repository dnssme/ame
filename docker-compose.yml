# =============================================================
# Anima 灵枢 · 统一 Docker Compose
# 用法：
#   全量启动：docker compose up -d
#   轻量启动：docker compose --profile lightweight up -d
#     轻量 profile 限制核心服务总内存适配 1 GB VPS
#
# 硬件基准：4× 双核 1 GB VPS + CXI4 i7-10610U 8 GB
#   VPS A (172.16.1.1)：Nginx 反向代理（无 Docker 服务，仅系统级 Nginx）
#   VPS B (172.16.1.2)：OpenClaw   450m（default）/ 256m（lightweight）
#   VPS C (172.16.1.3)：LibreChat  680m（default）/ 384m（lightweight）
#   VPS D (172.16.1.4)：Nextcloud  512m
#   CXI4  (172.16.1.5)：Webhook 256m + Whisper 2g + TTS 768m + Email 192m
# =============================================================
services:
  # ─── LibreChat Web UI ──────────────────────────────────────
  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    restart: unless-stopped
    profiles: ["default"]

    mem_limit: 680m
    mem_reservation: 320m
    cpus: '1.5'
    pids_limit: 200

    security_opt:
      - no-new-privileges:true
    read_only: false
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

    ports:
      - "172.16.1.3:3080:3080"

    volumes:
      - ./librechat/.env:/app/.env:ro
      - ./librechat/librechat.yaml:/app/librechat.yaml:ro
      - ./librechat/uploads:/app/uploads
      - ./librechat/logs:/app/logs

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=448"
      TZ: Asia/Shanghai

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ─── OpenClaw Agent ────────────────────────────────────────
  openclaw:
    build: ./openclaw
    container_name: openclaw
    restart: unless-stopped
    profiles: ["default"]

    # VPS B (1GB)：OpenClaw 450m → 内核留 ~550m（Telegram/WeChat 启用时约 770m）
    mem_limit: 450m
    mem_reservation: 200m
    cpus: '1.5'
    pids_limit: 200

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp

    ports:
      - "172.16.1.2:3000:3000"

    volumes:
      - ./openclaw/config.yml:/app/config.yml:ro
      - ./openclaw/data:/app/data

    env_file:
      - path: ./openclaw/.env
        required: true

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=320"
      TZ: Asia/Shanghai

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ─── LibreChat 轻量版（lightweight profile）─────────────────
  librechat-light:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    restart: unless-stopped
    profiles: ["lightweight"]

    # 轻量 profile（VPS C 1GB）：LibreChat 384m + 内核预留 ≈ 640m
    mem_limit: 384m
    mem_reservation: 192m
    cpus: '1.0'
    pids_limit: 150

    security_opt:
      - no-new-privileges:true
    read_only: false
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

    ports:
      - "172.16.1.3:3080:3080"

    volumes:
      - ./librechat/.env:/app/.env:ro
      - ./librechat/librechat.yaml:/app/librechat.yaml:ro
      - ./librechat/uploads:/app/uploads
      - ./librechat/logs:/app/logs

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=256"
      TZ: Asia/Shanghai

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ─── OpenClaw Agent 轻量版 ─────────────────────────────────
  openclaw-light:
    build: ./openclaw
    container_name: openclaw
    restart: unless-stopped
    profiles: ["lightweight"]

    mem_limit: 256m
    mem_reservation: 128m
    cpus: '1.0'
    pids_limit: 150

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp

    ports:
      - "172.16.1.2:3000:3000"

    volumes:
      - ./openclaw/config.yml:/app/config.yml:ro
      - ./openclaw/data:/app/data

    env_file:
      - path: ./openclaw/.env
        required: true

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=192"
      TZ: Asia/Shanghai

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ─── Webhook 计费服务（CXI4 8GB）────────────────────────────
  webhook:
    build: ./webhook
    container_name: anima-webhook
    restart: unless-stopped
    profiles: ["default"]

    # CXI4 i7-10610U 8GB：计费 384m + Whisper 2g + TTS 768m + Email 192m ≈ 3.3GB
    mem_limit: 384m
    mem_reservation: 192m
    cpus: '1.5'
    pids_limit: 100

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp

    ports:
      - "172.16.1.5:3002:3002"

    env_file:
      - path: ./webhook/.env
        required: true

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=256"
      TZ: Asia/Shanghai

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ─── Webhook 计费服务 轻量版 ─────────────────────────────────
  webhook-light:
    build: ./webhook
    container_name: anima-webhook
    restart: unless-stopped
    profiles: ["lightweight"]

    # CXI4 i7-10610U 8GB 轻量：计费 256m + Whisper 2g + TTS 768m + Email 192m ≈ 3.2GB
    mem_limit: 256m
    mem_reservation: 128m
    cpus: '1.0'
    pids_limit: 100

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp

    ports:
      - "172.16.1.5:3002:3002"

    env_file:
      - path: ./webhook/.env
        required: true

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=192"
      TZ: Asia/Shanghai

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
