# =============================================================
# Anima 灵枢 · OWASP CRS 调优配置
# 基于 OWASP CRS v4.x 的 crs-setup.conf 模板定制
#
# 合规对标：
#   · PCI-DSS 6.4.1 — 必须部署 WAF 保护公共 Web 应用
#   · PCI-DSS 6.4.2 — WAF 应能检测/阻止 OWASP Top 10 攻击
#   · CIS Controls v8 §13 — 网络监控与防御
#
# 性能优化原则：
#   · 异常评分模式（非逐条拦截）减少误报
#   · 仅检查 AI 应用实际使用的请求方法
#   · 排除内部 API 路径的低风险规则
#   · 合理的评分阈值平衡安全与可用性
# =============================================================

# ─── 1. 运行模式 ─────────────────────────────────────────────
# 异常评分模式（推荐用于生产环境）
# 每条规则匹配增加分数，累计超过阈值才拦截
# 优势：减少单条规则误报导致的合法请求被拦
SecAction \
    "id:900000,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    setvar:tx.blocking_paranoia_level=1,\
    setvar:tx.detection_paranoia_level=2,\
    setvar:tx.executing_paranoia_level=1"

# ─── 2. 异常评分阈值 ─────────────────────────────────────────
# PL1 阈值：入站 5（单条 CRITICAL 即拦截）
# 出站阈值 4（数据泄露检测）
# 此为 PCI-DSS 推荐的严格阈值
SecAction \
    "id:900110,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    setvar:tx.inbound_anomaly_score_threshold=5,\
    setvar:tx.outbound_anomaly_score_threshold=4"

# ─── 3. 各严重级别评分 ───────────────────────────────────────
# CRITICAL=5, ERROR=4, WARNING=3, NOTICE=2（CRS 默认值）
SecAction \
    "id:900100,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    setvar:tx.critical_anomaly_score=5,\
    setvar:tx.error_anomaly_score=4,\
    setvar:tx.warning_anomaly_score=3,\
    setvar:tx.notice_anomaly_score=2"

# ─── 4. HTTP 策略 ────────────────────────────────────────────
# 仅允许本应用使用的 HTTP 方法（CIS 最小化原则）
SecAction \
    "id:900200,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    setvar:'tx.allowed_methods=GET HEAD POST PUT OPTIONS'"

# 仅允许的 Content-Type（AI API 场景）
SecAction \
    "id:900220,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    setvar:'tx.allowed_request_content_type=|application/x-www-form-urlencoded| |multipart/form-data| |multipart/related| |text/xml| |application/xml| |application/soap+xml| |application/json| |application/octet-stream|'"

# 仅允许的响应 Content-Type
SecAction \
    "id:900250,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    setvar:'tx.allowed_http_versions=HTTP/1.1 HTTP/2 HTTP/2.0 HTTP/3 HTTP/3.0'"

# ─── 5. 文件扩展名 & 路径限制 ────────────────────────────────
# 禁止上传的危险文件扩展名（PCI-DSS 6.4.2）
SecAction \
    "id:900260,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    setvar:'tx.restricted_extensions=.asa/ .asax/ .ascx/ .backup/ .bak/ .bat/ .cdx/ .cer/ .cfg/ .cmd/ .com/ .config/ .conf/ .cs/ .csproj/ .csr/ .dat/ .db/ .dbf/ .dll/ .dos/ .htr/ .htw/ .ida/ .idc/ .idq/ .inc/ .ini/ .key/ .licx/ .lnk/ .log/ .mdb/ .old/ .pass/ .pdb/ .pol/ .printer/ .pwd/ .rdb/ .resources/ .resx/ .sql/ .swp/ .sys/ .vb/ .vbs/ .vbproj/ .vsdisco/ .webinfo/ .xsd/ .xsx/'"

# 禁止访问的目录（防止路径遍历/信息泄露）
SecAction \
    "id:900270,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    setvar:'tx.restricted_headers=/accept-charset/ /content-encoding/ /proxy/ /lock-token/ /content-range/ /translate/ /if/'"

# ─── 6. 地理位置 & IP 信誉（可选，如已集成 GeoIP2）─────────
# 默认不启用，如需按国家限制访问请取消注释
# SecGeoLookupDB /usr/share/GeoIP/GeoLite2-Country.mmdb
# SecAction "id:900600,phase:1,pass,t:none,nolog,setvar:'tx.high_risk_country_codes='"

# ─── 7. 采样率（生产全量检查）────────────────────────────────
# 100% 请求通过 CRS 检查（PCI-DSS 要求全量审计）
SecAction \
    "id:900400,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    setvar:tx.sampling_percentage=100"

# ─── 8. CRS 规则集排除初始化 ─────────────────────────────────
# 以下为 CRS 内部使用的变量初始化，勿修改
SecAction \
    "id:900990,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    setvar:tx.crs_setup_version=400"
