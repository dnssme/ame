# =============================================================
# Anima 灵枢 · 邮件处理模块
# 部署节点：CXI4 (172.16.1.5) · i7-10610U 8 GB RAM
# =============================================================

services:
  email-processor:
    build: .
    container_name: anima-email
    restart: unless-stopped

    # CXI4 8GB：邮件处理模块是后台轮询，无需大量资源
    mem_limit: 192m
    mem_reservation: 64m
    cpus: '0.5'
    pids_limit: 50

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp

    env_file:
      - path: ./.env
        required: true

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=128"
      TZ: Asia/Shanghai

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
