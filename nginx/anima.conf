# =============================================================
# Anima 灵枢 · Nginx 反向代理配置
# VPS A (172.16.1.1) · 对外唯一入口
# 特性：HTTPS / HTTP2 / 安全头 / 限速 / 缓存 / ModSecurity WAF
#
# 合规：CIS Controls v8 / PCI-DSS v4.0
#
# 修复记录：
#   v2.1  v3.2 微信官方开放平台接入/强制认证/强隔离/CIS合规基线
#         - 微信开放平台 component 端点走 clawbot 限速 300r/m（微信推送）
#         - 微信管理 API 走 clawbot_admin 限速 30r/m（仅 Web 管理面）
#         - CIS 合规端点走 clawbot_admin 限速 30r/m
#   v2.0  v3.1 新增微信原生登录/插件生命周期/统一调度/计费/合规增强
#         - 微信原生登录端点复用 /clawbot/auth/ 限速 120r/m
#         - 插件生命周期端点走 clawbot_heartbeat 限速 120r/m
#         - 统一调度中心端点复用 /clawbot/portal/ 限速 120r/m
#         - 企业计费端点复用 /clawbot/ops/ 管理限速 30r/m
#         - 合规审计/扫描复用 /clawbot/compliance/ 管理限速 30r/m
#   v1.9  v3.0 新增自助接入门户/统一登录网关/功能门户/运维增强/合规证据
#         - 统一登录端点走 clawbot_heartbeat 限速 120r/m
#         - 功能门户端点走 clawbot_heartbeat 限速 120r/m
#         - 运维仪表盘/告警/费用走 clawbot_admin 限速 30r/m
#         - 合规证据端点走 clawbot_admin 限速 30r/m
#         - SDK 事件订阅走 clawbot_heartbeat 限速 120r/m
#   v1.8  v2.9 新增灵枢统一通道/SDK回调/运维端点
#         - 灵枢通道端点走 clawbot_heartbeat 限速 120r/m
#         - SDK 回调端点走 clawbot_heartbeat 限速 120r/m
#         - 运维端点走 clawbot_admin 限速 30r/m
#   v1.7  v2.8 新增 ClawBot 客服/内容/订阅/个性化菜单端点
#         - 客服管理端点走 clawbot_admin 限速 30r/m
#         - 内容生命周期端点走 clawbot_admin 限速 30r/m
#         - 订阅消息端点走 clawbot_admin 限速 30r/m
#         - 个性化菜单端点走 clawbot_admin 限速 30r/m
#   v1.6  v2.6 新增 ClawBot 通道网关/事件中继/会话联邦/实时合规端点
#         - 通道网关端点走 clawbot_admin 限速 30r/m
#         - Webhook 中继端点走 clawbot_admin 限速 30r/m
#         - 会话联邦端点走 clawbot_admin 限速 30r/m
#         - 实时合规端点走 clawbot_admin 限速 30r/m
#         - 通道心跳端点走 clawbot_heartbeat 限速 120r/m
#   v1.5  v2.5 新增 ClawBot 插件心跳/协商端点限速区
#         - 心跳端点独立限速 120r/m
#         - 租户管理/API密钥走 admin 限速 30r/m
#   v1.4  新增 ClawBot 灵枢接入通道反向代理（/clawbot/ + /wecom/webhook）
#         - 微信/企业微信 Webhook 独立限速 300r/m
#         - ClawBot 管理端点独立限速 30r/m
#         - ClawBot OAuth2.0 网页授权走 login 限速 5r/m
#         - 所有 ClawBot 流量经 ModSecurity WAF + TLS（PCI-DSS 6.4.1 / 4.1）
#   v1.3  补充 /providers 路由（数据库统一 provider 配置接口）
#         原缺少该 location，请求被 location / 代理到 LibreChat 返回 404
#   v1.2  新增独立 billingCheck 限速区（120r/m）
#   v1.1  添加 access_log / error_log 显式配置
#   v1.1  /tts/ 添加 proxy_read_timeout 120s
# =============================================================

# ─── ModSecurity WAF（PCI-DSS 6.4.1 / CIS 13）────────────────
modsecurity on;
modsecurity_rules_file /opt/owasp/conf/main.conf;

# 隐藏 Nginx 版本号
server_tokens off;

# Gzip 压缩
gzip            on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied    any;
gzip_vary       on;
gzip_types
    text/plain
    text/css
    text/javascript
    application/json
    application/javascript
    application/x-javascript
    text/xml
    application/xml
    application/xml+rss
    image/svg+xml;

# 共享内存：限速区 / SSL 会话
limit_req_zone  $binary_remote_addr zone=api:10m     rate=30r/m;
limit_req_zone  $binary_remote_addr zone=login:10m   rate=5r/m;
limit_req_zone  $binary_remote_addr zone=tts:10m     rate=10r/m;
limit_req_zone  $binary_remote_addr zone=whisper:10m rate=10r/m;
limit_req_zone  $binary_remote_addr zone=activate:10m rate=3r/m;
limit_req_zone  $binary_remote_addr zone=billing:10m rate=60r/m;
limit_req_zone  $binary_remote_addr zone=billingCheck:10m rate=120r/m;
limit_req_zone  $binary_remote_addr zone=clawbot:10m     rate=300r/m;
limit_req_zone  $binary_remote_addr zone=clawbot_admin:10m rate=30r/m;
limit_req_zone  $binary_remote_addr zone=clawbot_heartbeat:10m rate=120r/m;
limit_conn_zone $binary_remote_addr zone=perip:10m;

client_body_timeout    12s;
client_header_timeout  12s;
keepalive_timeout      65s;
send_timeout           10s;

# 自定义日志格式：包含 $upstream_addr 和 $upstream_response_time
# 便于排查后端节点问题（CIS 审计日志要求）
log_format upstream_combined
    '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" upstream=$upstream_addr '
    'upstream_time=$upstream_response_time';

# =============================================================
# HTTP → HTTPS 强制跳转
# =============================================================
server {
    listen      80;
    listen      [::]:80;
    server_name <你的域名>;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================
# HTTPS 主站
# =============================================================
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name <你的域名>;

    access_log /opt/nginx/logs/anima_access.log upstream_combined;
    error_log  /opt/nginx/logs/anima_error.log warn;

    ssl_certificate     /etc/letsencrypt/live/<你的域名>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<你的域名>/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:20m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    ssl_stapling        on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/<你的域名>/chain.pem;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "SAMEORIGIN"                                    always;
    add_header X-Content-Type-Options     "nosniff"                                       always;
    add_header X-XSS-Protection           "1; mode=block"                                 always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss://$server_name; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';"
        always;

    limit_conn perip 20;
    client_max_body_size 50m;

    # ─── LibreChat 主界面 ────────────────────────────────────
    location / {
        proxy_pass         http://172.16.1.3:3080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_hide_header  X-Powered-By;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;
    }

    # ─── LibreChat API（含 AI 推理，单独限速）────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://172.16.1.3:3080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_hide_header  X-Powered-By;
        proxy_read_timeout 300s;
        proxy_buffering    off;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"    always;
    }

    # ─── 登录接口单独限速（防暴力破解）──────────────────────
    location /api/auth/ {
        limit_req zone=login burst=3 nodelay;

        proxy_pass        http://172.16.1.3:3080;
        proxy_http_version 1.1;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"    always;
    }

    # ─── OpenClaw Agent API ───────────────────────────────────
    location /api/agent/ {
        proxy_pass         http://172.16.1.2:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;
        proxy_read_timeout 120s;
        proxy_buffering    off;
        proxy_cache        off;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"    always;
    }

    # ─── Coqui TTS 语音合成（CXI4，单独限速）──────────────────
    location /tts/ {
        limit_req zone=tts burst=5 nodelay;

        proxy_pass         http://172.16.1.5:8082/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;
        proxy_read_timeout    120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"    always;
    }

    # ─── Whisper 语音识别（CXI4，单独限速）─────────────────────
    location /whisper/ {
        limit_req zone=whisper burst=5 nodelay;

        proxy_pass         http://172.16.1.5:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;
        client_max_body_size 20m;
        proxy_read_timeout   60s;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"    always;
    }

    # ─── 订阅激活（Webhook）──────────────────────────────────
    location = /activate {
        limit_req zone=activate burst=2 nodelay;
        # FIX-5.37-3: 纵深防御——Nginx 层收紧 body 大小，与 Express 256kb 限制对齐
        client_max_body_size 1m;

        proxy_pass         http://172.16.1.6:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"    always;
    }
    # FIX-5.37-2: 屏蔽 /activate 尾部斜杠变体
    # location = /activate 为精确匹配，/activate/ 不命中会落入 location /
    # 虽不可利用（到达 LibreChat 后端），但纵深防御要求显式阻断
    location = /activate/ {
        return 403;
    }

    # ─── Nextcloud（日历 CalDAV / 网盘 WebDAV 模块）────────────
    location /nextcloud/ {
        proxy_pass         http://172.16.1.4:8090/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;
        client_max_body_size 1g;
        proxy_read_timeout 300s;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "SAMEORIGIN"                                    always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';"
            always;
    }

    # ─── ClawBot 灵枢接入通道（微信 / 企业微信 Webhook）──────
    # 微信服务器回调：高频 Webhook，独立限速 300r/m
    location /clawbot/webhook {
        limit_req zone=clawbot burst=60 nodelay;

        proxy_pass         http://172.16.1.2:3004;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;
        proxy_read_timeout 120s;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"    always;
    }

    # ClawBot OAuth2.0 网页授权回调（用户授权跳转）
    location /clawbot/oauth {
        limit_req zone=login burst=5 nodelay;

        proxy_pass         http://172.16.1.2:3004;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"    always;
    }

    # v3.2 微信开放平台 Component 端点（微信服务器推送，限速 300r/m）
    location /clawbot/component/ {
        limit_req zone=clawbot burst=30 nodelay;

        proxy_pass         http://172.16.1.2:3004;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"    always;
    }

    # ClawBot 灵枢统一通道（v2.9 统一入口，限速 120r/m）
    location /clawbot/lingshu/ {
        limit_req zone=clawbot_heartbeat burst=20 nodelay;

        proxy_pass         http://172.16.1.2:3004;
        proxy_http_version 1.1;
