    # ─── v1.3 新增：数据库统一 Provider 配置接口 ─────────────
    # 供 OpenClaw / LibreChat 动态获取 provider base URL（不含 API Key）
    # 原缺少此路由，请求被 location / 代理到 LibreChat，始终 404
    location = /providers {
        limit_req zone=billing burst=20 nodelay;

        proxy_pass         http://172.16.1.6:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
