version: '3.8'

# =============================================================
# Anima 灵枢 · OpenClaw Agent Docker Compose
# 部署节点：VPS B (172.16.1.2)
# =============================================================

services:
  openclaw:
    image: openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped

    mem_limit: 600m
    mem_reservation: 256m

    security_opt:
      - no-new-privileges:true

    # 只绑定内网 IP
    ports:
      - "172.16.1.2:3000:3000"

    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./data:/app/data

    # API Key 等敏感变量从 .env 文件加载（docker compose 自动读取同目录 .env）
    env_file:
      - path: ./.env
        required: true

    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
