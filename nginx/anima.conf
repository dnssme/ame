        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"    always;
    }

    # 预检余额（高频，独立限速 120r/m）
    # FIX-5.34-3: 纵深防御——/billing/check 仅供内部服务调用（需 SERVICE_TOKEN），
    # 无需外网可达，限制为 WireGuard 内网 + LibreChat 节点访问
    location = /billing/check {
        allow 172.16.1.0/24;
        deny all;

        limit_req zone=billingCheck burst=40 nodelay;
        # FIX-5.37-3: 纵深防御——Nginx 层收紧 body 大小
        client_max_body_size 1m;

        proxy_pass         http://172.16.1.6:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"    always;
    }

    # 查询可用模型
    location = /models {
        limit_req zone=billing burst=20 nodelay;
        # FIX-5.37-3: 纵深防御——Nginx 层收紧 body 大小
        client_max_body_size 1m;

        proxy_pass         http://172.16.1.6:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"    always;
    }

    # ─── v1.3 新增：数据库统一 Provider 配置接口 ─────────────
    # 供 OpenClaw / LibreChat 动态获取 provider base URL（不含 API Key）
    # 原缺少此路由，请求被 location / 代理到 LibreChat，始终 404
    location = /providers {
        limit_req zone=billing burst=20 nodelay;
        # FIX-5.37-3: 纵深防御——Nginx 层收紧 body 大小
        client_max_body_size 1m;

        proxy_pass         http://172.16.1.6:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;

        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Cache-Control              "no-store"                                       always;
        add_header X-Robots-Tag              "noindex, nofollow"                              always;
        add_header X-XSS-Protection           "1; mode=block"                                 always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'none'; frame-ancestors 'none'"    always;
    }

    # ─── 阻止常见扫描路径 ─────────────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }
    location ~ /\. {
        deny all;
    }
}
