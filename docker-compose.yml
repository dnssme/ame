# =============================================================
# Anima 灵枢 · 统一 Docker Compose
# 用法：
#   全量启动：docker compose up -d
#   轻量启动：docker compose --profile lightweight up -d
#     轻量 profile 限制核心服务总内存适配 1 GB VPS
#
# 硬件基准：5× 双核 1 GB VPS (香港 Azure) + CXI4 i7-10610U 8 GB (青岛)
#   VPS A (172.16.1.1)：Nginx 反向代理（无 Docker 服务，仅系统级 Nginx）
#   VPS B (172.16.1.2)：OpenClaw   450m（default）/ 256m（lightweight）
#   VPS C (172.16.1.3)：LibreChat  768m（default）/ 384m（lightweight）
#   VPS D (172.16.1.4)：Nextcloud  512m（日历/网盘，靠近 Azure PG）
#   VPS E (172.16.1.6)：Webhook 256m（default / lightweight）+ Redis 128m（计费服务，靠近 Azure PG）
#   CXI4  (172.16.1.5)：Whisper 2g + TTS 768m + Email 192m + HA 512m
#                        ≈ 3.5g，系统预留 ≈ 4.5g
# =============================================================
services:
  # ─── LibreChat Web UI ──────────────────────────────────────
  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    restart: unless-stopped
    profiles: ["default"]

    mem_limit: 768m
    mem_reservation: 384m
    cpus: '1.5'
    pids_limit: 200

    security_opt:
      - no-new-privileges:true
    read_only: false
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

    ports:
      - "172.16.1.3:3080:3080"

    volumes:
      - ./librechat/.env:/app/.env:ro
      - ./librechat/librechat.yaml:/app/librechat.yaml:ro
      - ./librechat/uploads:/app/uploads
      - ./librechat/logs:/app/logs

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=512"
      TZ: Asia/Shanghai

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── OpenClaw Agent ────────────────────────────────────────
  openclaw:
    build: ./openclaw
    container_name: openclaw
    restart: unless-stopped
    profiles: ["default"]

    # VPS B (1GB)：OpenClaw 450m → 内核留 ~550m（Telegram/WeChat 启用时约 770m）
    mem_limit: 450m
    mem_reservation: 200m
    cpus: '1.5'
    pids_limit: 200

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp

    ports:
      - "172.16.1.2:3000:3000"

    volumes:
      - ./openclaw/config.yml:/app/config.yml:ro
      - ./openclaw/data:/app/data

    env_file:
      - path: ./openclaw/.env
        required: true

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=320"
      TZ: Asia/Shanghai

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── LibreChat 轻量版（lightweight profile）─────────────────
  librechat-light:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat-light
    restart: unless-stopped
    profiles: ["lightweight"]

    # 轻量 profile（VPS C 1GB）：LibreChat 384m + 内核预留 ≈ 640m
    mem_limit: 384m
    mem_reservation: 192m
    cpus: '1.0'
    pids_limit: 150

    security_opt:
      - no-new-privileges:true
    read_only: false
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

    ports:
      - "172.16.1.3:3080:3080"

    volumes:
      - ./librechat/.env:/app/.env:ro
      - ./librechat/librechat.yaml:/app/librechat.yaml:ro
      - ./librechat/uploads:/app/uploads
      - ./librechat/logs:/app/logs

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=256"
      TZ: Asia/Shanghai

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── OpenClaw Agent 轻量版 ─────────────────────────────────
  openclaw-light:
    build: ./openclaw
    container_name: openclaw-light
    restart: unless-stopped
    profiles: ["lightweight"]

    mem_limit: 256m
    mem_reservation: 128m
    cpus: '1.0'
    pids_limit: 150

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp

    ports:
      - "172.16.1.2:3000:3000"

    volumes:
      - ./openclaw/config.yml:/app/config.yml:ro
      - ./openclaw/data:/app/data

    env_file:
      - path: ./openclaw/.env
        required: true

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=192"
      TZ: Asia/Shanghai

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Webhook 计费服务（VPS E 1GB）───────────────────────────
  webhook:
    build: ./webhook
    container_name: anima-webhook
    restart: unless-stopped
    profiles: ["default"]

    # VPS E (1GB)：Webhook 256m + Redis 128m ≈ 384m → 系统预留 ~640m
    mem_limit: 256m
    mem_reservation: 128m
    cpus: '1.5'
    pids_limit: 100

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp

    ports:
      - "172.16.1.6:3002:3002"

    env_file:
      - path: ./webhook/.env
        required: true

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=192"
      TZ: Asia/Shanghai

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Webhook 计费服务 轻量版 ─────────────────────────────────
  webhook-light:
    build: ./webhook
    container_name: anima-webhook-light
    restart: unless-stopped
    profiles: ["lightweight"]

    # VPS E (1GB) 轻量：Webhook 256m + Redis 128m ≈ 384m → 系统预留 ~640m
    mem_limit: 256m
    mem_reservation: 128m
    cpus: '1.0'
    pids_limit: 100

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp

    ports:
      - "172.16.1.6:3002:3002"

    env_file:
      - path: ./webhook/.env
        required: true

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=192"
      TZ: Asia/Shanghai

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Redis 缓存（VPS E 1GB，计费限额计数）──────────────────
  redis:
    image: redis:7-alpine
    container_name: anima-redis
    restart: unless-stopped

    # VPS E (1GB)：Redis 128m + Webhook 256m ≈ 384m → 系统预留 ~640m
    mem_limit: 128m
    mem_reservation: 64m
    cpus: '0.5'
    pids_limit: 50

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

    # ⚠️ 只绑定内网 IP，绝不暴露在 0.0.0.0
    ports:
      - "172.16.1.6:6379:6379"

    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD}"
      --maxmemory 96mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no

    environment:
      REDISCLI_AUTH: "${REDIS_PASSWORD}"

    env_file:
      - path: ./webhook/.env
        required: true

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
