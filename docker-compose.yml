# =============================================================
# Anima 灵枢 · 统一 Docker Compose
# 用法：
#   全量启动：docker compose up -d
#   轻量启动：docker compose --profile lightweight up -d
#     轻量 profile 限制核心服务总内存 ≤ 768 MB（适合 1 GB VPS）
# =============================================================
version: '3.8'

services:
  # ─── LibreChat Web UI ──────────────────────────────────────
  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    restart: unless-stopped
    profiles: ["default"]

    mem_limit: 768m
    mem_reservation: 384m
    cpus: '1.5'

    security_opt:
      - no-new-privileges:true
    read_only: false
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

    ports:
      - "172.16.1.3:3080:3080"

    volumes:
      - ./librechat/.env:/app/.env:ro
      - ./librechat/uploads:/app/uploads
      - ./librechat/logs:/app/logs

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=512"
      TZ: Asia/Shanghai

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ─── OpenClaw Agent ────────────────────────────────────────
  openclaw:
    image: openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    profiles: ["default"]

    mem_limit: 600m
    mem_reservation: 256m
    cpus: '1.5'

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

    ports:
      - "172.16.1.2:3000:3000"

    volumes:
      - ./openclaw/config.yml:/app/config.yml:ro
      - ./openclaw/data:/app/data

    env_file:
      - path: ./openclaw/.env
        required: true

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=384"
      TZ: Asia/Shanghai

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ─── LibreChat 轻量版（lightweight profile）─────────────────
  librechat-light:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    restart: unless-stopped
    profiles: ["lightweight"]

    # 轻量 profile：严格控制在 768 MB 总内存内
    # LibreChat 384m + OpenClaw 256m + Webhook 128m = 768m
    mem_limit: 384m
    mem_reservation: 192m
    cpus: '1.0'

    security_opt:
      - no-new-privileges:true
    read_only: false
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

    ports:
      - "172.16.1.3:3080:3080"

    volumes:
      - ./librechat/.env:/app/.env:ro
      - ./librechat/uploads:/app/uploads
      - ./librechat/logs:/app/logs

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=256"
      TZ: Asia/Shanghai

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ─── OpenClaw Agent 轻量版 ─────────────────────────────────
  openclaw-light:
    image: openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    profiles: ["lightweight"]

    mem_limit: 256m
    mem_reservation: 128m
    cpus: '1.0'

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

    ports:
      - "172.16.1.2:3000:3000"

    volumes:
      - ./openclaw/config.yml:/app/config.yml:ro
      - ./openclaw/data:/app/data

    env_file:
      - path: ./openclaw/.env
        required: true

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=192"
      TZ: Asia/Shanghai

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ─── Webhook 计费服务轻量版 ────────────────────────────────
  webhook-light:
    build: ./webhook
    container_name: anima-webhook
    restart: unless-stopped
    profiles: ["lightweight"]

    mem_limit: 128m
    mem_reservation: 64m
    cpus: '0.5'

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

    ports:
      - "172.16.1.5:3002:3002"

    env_file:
      - path: ./webhook/.env
        required: true

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=112"
      TZ: Asia/Shanghai

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
