# =============================================================
# Anima 灵枢 · LibreChat Docker Compose
# 部署节点：VPS C (172.16.1.3)
# =============================================================

services:
  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    restart: unless-stopped

    # 内存限制（VPS C 双核 1 GB RAM，需预留 ~256 MB 给 Linux 内核及系统服务）
    mem_limit: 768m
    mem_reservation: 384m
    # CPU 限制（CIS 2.4 防止资源耗尽）
    cpus: '1.5'

    # 安全加固
    security_opt:
      - no-new-privileges:true
    read_only: false   # LibreChat 需要写入日志目录
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

    # 只绑定内网 IP，不对公网直接暴露
    ports:
      - "172.16.1.3:3080:3080"

    volumes:
      - ./.env:/app/.env:ro
      - ./librechat.yaml:/app/librechat.yaml:ro
      - ./uploads:/app/uploads
      - ./logs:/app/logs

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=512"
      TZ: Asia/Shanghai

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # 等待（实际上 PostgreSQL 在外部的 Azure，无需 depends_on）
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
