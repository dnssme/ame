# =============================================================
# Anima 灵枢 · OpenClaw Agent 配置
# 部署节点：VPS B (172.16.1.2)
#
# 安全提示：所有 <占位符> 内容请替换为真实值后将文件权限设为 600：
#   chmod 600 /opt/openclaw/config.yml
# 推荐改用环境变量插值（${ENV_VAR}），避免密钥直接写入文件
# =============================================================

# ─── 服务器 ──────────────────────────────────────────────────
server:
  host: 172.16.1.2
  port: 3000

# =============================================================
# ─── AI 推理（直接调用云端 API，用户自行选择模型）────────────
# 可用模型列表由 billing webhook 的 GET /models 接口返回。
# OpenClaw 将用户所选模型的 provider/modelName 字段用于此处路由。
#
# ┌─────────────────────────────────────────────────────────┐
# │  默认免费模型说明                                          │
# │  defaultModel = glm-4-flash（智谱 GLM-4-Flash）           │
# │  · 智谱官方免费提供，0 成本部署                            │
# │  · 在 db/schema.sql 中标记为 is_free=true（不扣用户余额）  │
# │  · 速度快（~1s）、支持 128k 上下文、适合日常对话            │
# │                                                         │
# │  如需更改默认模型，推荐候选（按成本从低到高）：              │
# │    1. glm-4-flash       (Zhipu,    0 元/次，免费)         │
# │    2. deepseek-chat     (DeepSeek, ¥0.001/1K input)     │
# │    3. gemini-2.0-flash  (Google,   有免费配额)            │
# │    4. claude-haiku-4-5  (Anthropic,¥0.003/1K input)     │
# └─────────────────────────────────────────────────────────┘
# =============================================================
llm:
  providers:

    # ────────────────────────────────────────────────────────
    # ── 全球 Top 10 提供商 ──────────────────────────────────
    # ────────────────────────────────────────────────────────

    # ── 1. Anthropic / Claude ──────────────────────────────
    # 申请 API Key：https://console.anthropic.com/
    - name: anthropic
      apiKey: ${ANTHROPIC_API_KEY}       # 通过环境变量注入，勿写死
      models:
        # Claude 4 系列
        - claude-opus-4-0                # 最强旗舰，适合复杂推理
        - claude-sonnet-4-5              # 均衡型，主力付费模型
        - claude-haiku-4-5-20251001      # 默认免费模型（is_free=true）
        # Claude 3.x 系列
        - claude-3-7-sonnet-20250219     # 支持 Extended Thinking
        - claude-3-5-sonnet-20241022     # 稳定主力
        - claude-3-5-haiku-20241022      # 快速轻量
      timeout: 60
      maxRetries: 2

    # ── 2. OpenAI / GPT ───────────────────────────────────
    # 申请 API Key：https://platform.openai.com/
    - name: openai
      apiKey: ${OPENAI_API_KEY}
      baseUrl: https://api.openai.com/v1
      models:
        # GPT-4.1 系列（2025年4月发布）
        - gpt-4.1                        # 旗舰，128k context
        - gpt-4.1-mini                   # 高性价比
        - gpt-4.1-nano                   # 最低成本
        # GPT-4o 稳定版
        - gpt-4o                         # 多模态旗舰
        - gpt-4o-mini                    # 轻量多模态
        # o 系列推理模型
        - o4-mini                        # 最新推理，高性价比
        - o3                             # 最强推理
        - o3-mini                        # 推理轻量版
        - o1                             # 首代推理
        - o1-mini                        # 推理入门
      timeout: 120
      maxRetries: 2

    # ── 3. Google / Gemini ────────────────────────────────
    # 申请 API Key：https://aistudio.google.com/apikey
    - name: google
      apiKey: ${GOOGLE_API_KEY}
      baseUrl: https://generativelanguage.googleapis.com/v1beta/openai
      models:
        # Gemini 2.5 系列（最新）
        - gemini-2.5-pro-preview-05-06   # 旗舰，最强推理
        - gemini-2.5-flash-preview-04-17 # 速度与质量均衡
        # Gemini 2.0 系列
        - gemini-2.0-flash               # 稳定快速，有免费配额
        - gemini-2.0-flash-lite          # 极低成本
        # Gemini 1.5 系列（稳定版）
        - gemini-1.5-pro                 # 长上下文 2M tokens
        - gemini-1.5-flash               # 快速低成本
        - gemini-1.5-flash-8b            # 最轻量
      timeout: 60
      maxRetries: 2

    # ── 4. xAI / Grok ─────────────────────────────────────
    # 申请 API Key：https://console.x.ai/
    - name: xai
      apiKey: ${XAI_API_KEY}
      baseUrl: https://api.x.ai/v1
      models:
        - grok-3                         # 旗舰模型
        - grok-3-mini                    # 轻量推理
        - grok-3-fast                    # 快速响应
        - grok-2-latest                  # 上一代稳定版
      timeout: 60
      maxRetries: 2

    # ── 5. Mistral AI ──────────────────────────────────────
    # 申请 API Key：https://console.mistral.ai/
    - name: mistral
      apiKey: ${MISTRAL_API_KEY}
      baseUrl: https://api.mistral.ai/v1
      models:
        - mistral-large-latest           # 旗舰
        - mistral-medium-latest          # 均衡
        - mistral-small-latest           # 轻量高效
        - codestral-latest               # 代码专用
        - open-mistral-7b               # 开源 7B
      timeout: 30
      maxRetries: 2

    # ── 6. Cohere ─────────────────────────────────────────
    # 申请 API Key：https://dashboard.cohere.com/
    # 兼容 OpenAI 接口（/v1/chat/completions）
    - name: cohere
      apiKey: ${COHERE_API_KEY}
      baseUrl: https://api.cohere.com/compatibility/openai
      models:
        - command-r-plus-08-2024         # 旗舰 RAG 模型
        - command-r-08-2024              # 均衡 RAG
        - command-r7b-12-2024            # 轻量快速
      timeout: 30
      maxRetries: 2

    # ── 7. Groq（超高速推理，有免费层）──────────────────────
    # 申请 API Key：https://console.groq.com/
    # 托管开源模型，速度极快（500+ tokens/s）
    - name: groq
      apiKey: ${GROQ_API_KEY}
      baseUrl: https://api.groq.com/openai/v1
      models:
        # Meta Llama 4 系列（2025）
        - meta-llama/llama-4-scout-17b-16e-instruct
        - meta-llama/llama-4-maverick-17b-128e-instruct-fp8
        # Meta Llama 3.x 系列
        - llama-3.3-70b-versatile        # 强力开源模型
        - llama-3.1-8b-instant           # 超快轻量
        # 其他开源模型
        - mixtral-8x7b-32768
        - gemma2-9b-it
      timeout: 30
      maxRetries: 2

    # ── 8. Perplexity（联网搜索增强）─────────────────────────
    # 申请 API Key：https://www.perplexity.ai/settings/api
    - name: perplexity
      apiKey: ${PERPLEXITY_API_KEY}
      baseUrl: https://api.perplexity.ai
      models:
        - sonar-pro                      # 联网搜索旗舰
        - sonar                          # 联网搜索标准
        - sonar-reasoning-pro            # 推理+搜索旗舰
        - sonar-reasoning                # 推理+搜索标准
      timeout: 60
      maxRetries: 2

    # ────────────────────────────────────────────────────────
    # ── 中国 Top 5 提供商 ────────────────────────────────────
    # ────────────────────────────────────────────────────────

    # ── 中1. DeepSeek（深度求索）────────────────────────────
    # 申请 API Key：https://platform.deepseek.com/
    # 价格极低：V3 约 ¥0.001/1K 输入，¥0.002/1K 输出
    - name: deepseek
      apiKey: ${DEEPSEEK_API_KEY}
      baseUrl: https://api.deepseek.com/v1
      models:
        - deepseek-chat                  # DeepSeek-V3，综合最强，价格极低
        - deepseek-reasoner              # DeepSeek-R1，深度推理
      timeout: 60
      maxRetries: 2

    # ── 中2. Qwen 通义千问（阿里云灵积）────────────────────
    # 申请 API Key：https://dashscope.aliyuncs.com/
    - name: qwen
      apiKey: ${QWEN_API_KEY}
      baseUrl: https://dashscope.aliyuncs.com/compatible-mode/v1
      models:
        # Qwen3 系列（2025）
        - qwen3-235b-a22b                # Qwen3 旗舰 MoE
        - qwen3-32b                      # Qwen3 Dense 旗舰
        - qwen3-14b                      # Qwen3 均衡
        - qwq-32b                        # 推理专用（类 o1）
        # Qwen2.5 稳定版
        - qwen-max                       # 旗舰，最强综合能力
        - qwen-max-0428                  # 旗舰快照版
        - qwen-plus                      # 均衡型
        - qwen-turbo                     # 速度最快，价格最低
        - qwen-long                      # 超长上下文（1M tokens）
        - qwen-coder-plus                # 代码专用
      timeout: 60
      maxRetries: 2

    # ── 中3. Moonshot / Kimi（月之暗面）────────────────────
    # 申请 API Key：https://platform.moonshot.cn/
    - name: moonshot
      apiKey: ${MOONSHOT_API_KEY}
      baseUrl: https://api.moonshot.cn/v1
      models:
        - kimi-latest                    # Kimi 最新版（自动跟踪最新）
        - moonshot-v1-8k
        - moonshot-v1-32k
        - moonshot-v1-128k
      timeout: 60
      maxRetries: 2

    # ── 中4. Zhipu AI / GLM（智谱清言）────────────────────
    # 申请 API Key：https://open.bigmodel.cn/
    # glm-4-flash 完全免费（官方提供免费配额）
    - name: zhipu
      apiKey: ${ZHIPU_API_KEY}
      baseUrl: https://open.bigmodel.cn/api/paas/v4
      models:
        # GLM Z1 推理系列
        - glm-z1-plus                    # 推理旗舰
        - glm-z1-flash                   # 推理轻量（有免费配额）
        # GLM 4 系列
        - glm-4-plus                     # 对话旗舰
        - glm-4-air                      # 高性价比
        - glm-4-flash                    # ★ 官方免费，is_free=true 默认模型 ★
        - glm-4-long                     # 超长上下文
      timeout: 30
      maxRetries: 2

    # ── 中5-A. ByteDance / 豆包（字节跳动）────────────────
    # 申请 API Key：https://console.volcengine.com/ark
    # 注意：model_name 需填写火山方舟中的 endpoint_id 或模型名
    - name: doubao
      apiKey: ${DOUBAO_API_KEY}
      baseUrl: https://ark.cn-beijing.volces.com/api/v3
      models:
        - doubao-pro-32k                 # 旗舰 32k
        - doubao-pro-128k                # 旗舰长上下文
        - doubao-lite-32k                # 轻量低成本
        - doubao-lite-128k               # 轻量长上下文
      timeout: 30
      maxRetries: 2

    # ── 中5-B. Baidu / ERNIE 文心一言（百度）────────────────
    # 申请 API Key：https://console.bce.baidu.com/qianfan/
    # 兼容 OpenAI 接口（百度千帆 v2）
    - name: baidu
      apiKey: ${BAIDU_API_KEY}
      baseUrl: https://qianfan.baidubce.com/v2
      models:
        - ernie-4.5-turbo-preview        # ERNIE 4.5 旗舰
        - ernie-4.0-turbo-8k             # ERNIE 4.0 稳定版
        - ernie-speed-pro-128k           # 长上下文速度版
        - ernie-lite-8k                  # 轻量低成本
      timeout: 30
      maxRetries: 2

  # ─── 默认模型（未指定时使用此模型）────────────────────────
  # 选择 glm-4-flash 原因：
  #   · 智谱官方免费提供，运营商 0 成本
  #   · db/schema.sql 标记 is_free=true，用户不会消耗余额
  #   · 速度快（~1s），支持 128k 上下文，适合日常对话
  #   · 如需换更强的免费/低价模型，修改下面两行即可
  defaultProvider: zhipu
  defaultModel: glm-4-flash

# ─── 本地模型接口（保留定义，当前不启用）─────────────────────
# 如需重新启用本地 Ollama，将 enabled 改为 true 并在 api_models
# 表中执行：UPDATE api_models SET is_active=true WHERE provider='ollama';
ollama:
  enabled: false
  baseUrl: http://172.16.1.5:11434
  models:
    - qwen2.5:7b-instruct-q4_K_M
    - llama3.2:3b

# ─── 计费 Webhook（向 VPS-E 汇报每次 API 调用）────────────────
billing:
  enabled: true
  webhookUrl: http://172.16.1.6:3002/billing/record
  # 内部服务鉴权 Token（对应 webhook SERVICE_TOKEN 环境变量）
  # 用于 /billing/record 和 /billing/check 的来源鉴权，防止内网未授权进程伪造计费
  serviceToken: ${SERVICE_TOKEN}
  # 调用 /models 接口获取最新定价列表，每 5 分钟缓存一次
  modelsCacheUrl: http://172.16.1.6:3002/models
  modelsCacheTtl: 300

# ─── 记忆数据库 ───────────────────────────────────────────────
memory:
  enabled: true
  database: postgresql://animaapp:${PG_PASSWORD}@anima-db.postgres.database.azure.com:5432/openclaw?sslmode=require

# ─── Redis 缓存（复用 VPS-E 的 Redis）────────────────────────
redis:
  url: redis://:${REDIS_PASSWORD}@172.16.1.6:6379
  sessionTtl: 3600  # 对话上下文缓存 TTL（秒）

# ─── 工具配置 ─────────────────────────────────────────────────
tools:
  search:
    enabled: true
    provider: duckduckgo
    maxResults: 5

  calendar:
    enabled: true
    provider: nextcloud
    url: http://172.16.1.4:8090/remote.php/dav/calendars/admin/anima/
    username: admin
    password: ${NEXTCLOUD_PASSWORD}

  homeassistant:
    enabled: true
    baseUrl: http://172.16.1.5:8123
    token: ${HA_TOKEN}

  voice:
    recognition:
      url: http://172.16.1.5:8080/transcribe
    synthesis:
      url: http://172.16.1.5:8082/api/tts
