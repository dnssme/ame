# =============================================================
# Anima 灵枢 · ModSecurity 主配置
# 适用于 Nginx + libmodsecurity (ModSecurity v3)
#
# 合规对标：
#   · CIS Controls v8 — 控制项 13 (网络监控与防御)
#   · PCI-DSS v4.0    — 6.4.1 (WAF 保护公共 Web 应用)
#                     — 6.4.2 (WAF 检测/阻止常见攻击)
#
# 性能优化：
#   · SecRequestBodyLimit 适配 AI 聊天场景（最大 10 MB）
#   · SecResponseBodyAccess 关闭（避免检查 AI 生成的长文本）
#   · SecPcreMatchLimit 限制正则回溯防止 ReDoS
# =============================================================

# ─── 引擎开关 ─────────────────────────────────────────────────
# DetectionOnly = 仅日志不拦截（调试用）
# On            = 生产拦截模式（CIS/PCI-DSS 要求）
SecRuleEngine On

# ─── 请求体处理 ───────────────────────────────────────────────
# 启用请求体检查（必须开启才能检测 POST/PUT 中的注入）
SecRequestBodyAccess On

# 请求体大小限制（10 MB — 匹配 nginx client_max_body_size 50m 中
# 实际 API JSON 负载上限；语音上传走 /whisper/ 已排除 WAF）
SecRequestBodyLimit 10485760
# 超限时拒绝（而非截断，防止绕过）
SecRequestBodyLimitAction Reject
# 无文件时的内存缓冲（1 MB 足够 JSON API 请求）
SecRequestBodyNoFilesLimit 1048576

# ─── 响应体处理 ───────────────────────────────────────────────
# 关闭响应体检查（AI 生成的长文本会严重影响性能）
# PCI-DSS 6.4.2 要求检查入站攻击，不强制出站
SecResponseBodyAccess Off

# ─── 文件上传 ─────────────────────────────────────────────────
# 临时文件目录（systemd PrivateTmp 隔离）
SecTmpDir /tmp/modsecurity/tmp
SecDataDir /tmp/modsecurity/data
# 上传文件大小限制
SecUploadDir /tmp/modsecurity/upload
SecUploadKeepFiles Off

# ─── 日志配置 ─────────────────────────────────────────────────
# 审计日志（PCI-DSS 10.2 要求记录安全事件）
SecAuditEngine RelevantOnly
# 记录被拦截和具有警告标志的请求
SecAuditLogRelevantStatus "^(?:5|4(?!04))"

# 日志格式：JSON（便于 ELK/Loki 采集）
SecAuditLogFormat JSON
# 串行日志文件（单节点部署足够；高并发改用 Concurrent + SecAuditLogStorageDir）
SecAuditLogType Serial
SecAuditLog /var/log/modsecurity/audit.log

# 审计日志包含的部分：
# A = 审计日志头  B = 请求头  C = 请求体  E = 响应体(仅拦截时)
# F = 响应头  H = 审计日志附加信息  Z = 审计日志尾
SecAuditLogParts ABCFHZ

# 调试日志（生产环境设为 0 关闭；排查时改为 3 或 5）
SecDebugLog /var/log/modsecurity/debug.log
SecDebugLogLevel 0

# ─── 正则引擎限制（防 ReDoS）─────────────────────────────────
SecPcreMatchLimit 500000
SecPcreMatchLimitRecursion 500000

# ─── 默认拦截动作 ─────────────────────────────────────────────
# phase:1 = 请求头阶段，phase:2 = 请求体阶段
# deny = 拦截并返回 403
# status:403 = HTTP 状态码
# log = 记录到审计日志
SecDefaultAction "phase:1,log,auditlog,deny,status:403"
SecDefaultAction "phase:2,log,auditlog,deny,status:403"

# ─── 请求体解析器 ─────────────────────────────────────────────
# 启用 JSON 请求体解析（AI API 全部为 JSON）
SecRule REQUEST_HEADERS:Content-Type "(?:application(?:/soap\+|/)|text/)xml" \
    "id:200000,phase:1,t:none,t:lowercase,pass,nolog,ctl:requestBodyProcessor=XML"
SecRule REQUEST_HEADERS:Content-Type "application/json" \
    "id:200001,phase:1,t:none,t:lowercase,pass,nolog,ctl:requestBodyProcessor=JSON"

# ─── 服务器信息隐藏 ───────────────────────────────────────────
# 不在响应头暴露 ModSecurity 版本（CIS 安全配置）
SecServerSignature " "
SecStatusEngine Off

# ─── Unicode 映射 ─────────────────────────────────────────────
SecUnicodeMapFile /etc/modsecurity/unicode.mapping 20127

# ─── 引入 OWASP CRS ──────────────────────────────────────────
# 先加载排除规则（在 CRS 之前），再加载 CRS 核心规则集
Include /etc/modsecurity/crs-setup.conf
Include /etc/modsecurity/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf
Include /usr/share/modsecurity-crs/rules/*.conf
Include /etc/modsecurity/RESPONSE-999-EXCLUSION-RULES-AFTER-CRS.conf
